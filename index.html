<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIDC R$100MM — Cronograma</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0efe9;color:#1a1a18;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid rgba(0,0,0,.1);padding:0 1.5rem;position:sticky;top:0;z-index:50}
.topbar-inner{max-width:980px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:54px}
.topbar h1{font-size:14px;font-weight:600}
.topbar p{font-size:11px;color:#777;margin-top:1px}
.tabs{display:flex}
.tab{font-size:12px;font-weight:500;padding:0 16px;height:54px;border:none;background:none;color:#999;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s}
.tab.active{color:#1a1a18;border-bottom-color:#1a1a18}
.main{max-width:980px;margin:0 auto;padding:1.5rem}
.view{display:none}.view.active{display:block}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
.card{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:10px;padding:14px;text-align:center}
.card .num{font-size:22px;font-weight:600}
.card .lbl{font-size:11px;color:#888;margin-top:2px}
.gantt-wrap{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:12px;overflow:hidden}
.col-headers{display:grid;grid-template-columns:220px 85px repeat(4,1fr);background:#f7f6f2;border-bottom:1px solid rgba(0,0,0,.08);padding:7px 14px;gap:4px}
.col-h{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.05em;text-align:center}
.col-h:first-child{text-align:left}
.gantt-body{padding:10px 14px 14px}
.phase-sep{font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.05em;padding:12px 0 5px;border-top:1px solid rgba(0,0,0,.06);margin-top:4px}
.phase-sep:first-child{border-top:none;padding-top:2px}
.grow{display:grid;grid-template-columns:220px 85px repeat(4,1fr);gap:4px;align-items:center;margin-bottom:4px;border-radius:7px;padding:3px 0;transition:background .1s}
.grow:hover{background:#f7f6f2}
.gname{font-size:12px;font-weight:600;color:#1a1a18;line-height:1.3}
.gowner{font-size:11px;color:#777;margin-top:2px;display:flex;align-items:center;gap:4px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.gdead{font-size:11px;font-weight:700;text-align:center;padding:0 4px}
.gdead.crit{color:#b32c2c}
.gdead.ok{color:#2e7012}
.gdead.tbd{color:#aaa;font-style:italic;font-weight:400;font-size:10px}
.gcell{height:28px;border-radius:4px}
.gbar{border-radius:4px;height:28px;opacity:.82}
.gbar-s{border-radius:4px 0 0 4px;height:28px;opacity:.82}
.gbar-m{border-radius:0;height:28px;opacity:.82}
.gbar-e{border-radius:0 4px 4px 0;height:28px;opacity:.82}
.badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:99px;margin-left:3px;font-weight:600}
.badge-crit{background:#FDECEC;color:#7a1f1f}
.badge-tbd{background:#eee;color:#888}
.legend{display:flex;flex-wrap:wrap;gap:10px;padding:10px 14px;border-top:1px solid rgba(0,0,0,.07);background:#faf9f5}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#777}
.leg-color{width:14px;height:6px;border-radius:2px}
.prog-wrap{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:8px;padding:10px 16px;margin-bottom:1rem}
.ptrack{flex:1;height:4px;background:#e5e4e0;border-radius:99px;overflow:hidden}
.pfill{height:4px;background:#185FA5;border-radius:99px;width:0%;transition:width .3s}
.plbl{font-size:12px;color:#888;white-space:nowrap}
.todo-list{display:flex;flex-direction:column;gap:7px}
.todo-card{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:10px;overflow:hidden;cursor:pointer;transition:box-shadow .15s}
.todo-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.08)}
.todo-accent{height:3px;transition:background .3s}
.todo-row{display:grid;grid-template-columns:40px 1fr auto auto;align-items:center;padding:12px 16px;gap:12px}
.todo-num{font-size:18px;font-weight:700;color:#ddd}
.todo-title{font-size:13px;font-weight:600;color:#1a1a18;line-height:1.3;transition:all .2s}
.todo-title.done{text-decoration:line-through;color:#bbb}
.todo-meta{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
.owner-tag{display:inline-flex;align-items:center;gap:4px;background:#f0efe9;border-radius:99px;padding:2px 8px;font-size:11px;color:#444}
.todo-dead{font-size:12px;font-weight:700;white-space:nowrap;text-align:right}
.todo-dead.crit{color:#b32c2c}
.todo-dead.ok{color:#2e7012}
.todo-dead.tbd{color:#aaa;font-weight:400;font-style:italic}
.chkbox{width:22px;height:22px;border:1px solid rgba(0,0,0,.18);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.chkbox.done{background:#185FA5;border-color:#185FA5}
.chkbox svg{display:none}
.chkbox.done svg{display:block}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div>
      <h1>FIDC Fechado R$100MM — Plano de Implantação</h1>
      <p>60% NC imobiliária · 40% MCMS · Início: 14/07</p>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="show('gantt',this)">Cronograma</button>
      <button class="tab" onclick="show('todos',this)">To-dos</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="view active" id="v-gantt">
    <div class="cards" id="cards"></div>
    <div class="gantt-wrap">
      <div class="col-headers">
        <div class="col-h">Entregável</div>
        <div class="col-h">Deadline</div>
        <div class="col-h">14/07</div>
        <div class="col-h">22/07</div>
        <div class="col-h">24–28/07</div>
        <div class="col-h">31/07+</div>
      </div>
      <div class="gantt-body" id="gantt"></div>
      <div class="legend" id="legend"></div>
    </div>
  </div>
  <div class="view" id="v-todos">
    <div class="prog-wrap">
      <div class="ptrack"><div class="pfill" id="pfill"></div></div>
      <div class="plbl" id="plbl">0 / 8 concluídos</div>
    </div>
    <div class="todo-list" id="todos"></div>
  </div>
</div>

<script>
var C={originacao:'#534AB7',credito:'#185FA5',estruturacao:'#0F6E56',fornecedor:'#854F0B'};

var ITEMS=[
  {id:1,title:'Definição do novo analista (cobertura férias Guilherme)',owner:'Daniel',area:'credito',dead:'14/07',dc:'crit',s:1,e:1,phase:'Crédito e análise'},
  {id:2,title:'Estudo safrado da carteira',owner:'Vitor',area:'credito',dead:'22/07',dc:'ok',s:1,e:2,phase:'Crédito e análise'},
  {id:3,title:'Reunião com Luís — apresentar estudo safrado',owner:'Luís',area:'originacao',dead:'22/07',dc:'ok',s:2,e:2,phase:'Crédito e análise'},
  {id:4,title:'Levar para o comitê de crédito',owner:'Fabrizzio',area:'credito',dead:'24/07',dc:'ok',s:2,e:3,phase:'Crédito e análise'},
  {id:5,title:'Construção do regulamento (espelho do FIDC atual)',owner:'Davi + Fabinho',area:'estruturacao',dead:'24–31/07',dc:'ok',s:3,e:4,phase:'Estruturação'},
  {id:6,title:'Orçamento com a QiTech',owner:'Rodrigo',area:'fornecedor',dead:'24/07',dc:'ok',s:1,e:3,phase:'Fornecedores'},
  {id:7,title:'Reunião com Luís e Rodrigo — envio para estruturação',owner:'Luís + Rodrigo',area:'estruturacao',dead:'28/07',dc:'ok',s:3,e:3,phase:'Estruturação'},
  {id:8,title:'Estruturação (fluxos, prestadores, regulamento, implantação)',owner:'Estruturação',area:'estruturacao',dead:'A definir',dc:'tbd',s:3,e:4,phase:'Estruturação'},
];

function renderCards(){
  document.getElementById('cards').innerHTML=
    '<div class="card"><div class="num">8</div><div class="lbl">entregáveis</div></div>'+
    '<div class="card"><div class="num" style="color:#b32c2c">14/07</div><div class="lbl">crítico hoje</div></div>'+
    '<div class="card"><div class="num">24/07</div><div class="lbl">próximo marco</div></div>'+
    '<div class="card"><div class="num">28/07</div><div class="lbl">envio p/ estruturação</div></div>';
}

function renderGantt(){
  var g=document.getElementById('gantt');
  var lastPhase='';
  ITEMS.forEach(function(item){
    if(item.phase!==lastPhase){
      lastPhase=item.phase;
      var ph=document.createElement('div');
      ph.className='phase-sep';
      ph.textContent=item.phase;
      g.appendChild(ph);
    }
    var row=document.createElement('div');
    row.className='grow';
    var badge='';
    if(item.dc==='crit') badge='<span class="badge badge-crit">hoje</span>';
    else if(item.dc==='tbd') badge='<span class="badge badge-tbd">a definir</span>';
    var meta=document.createElement('div');
    meta.innerHTML='<div class="gname">'+item.title+'</div><div class="gowner"><span class="dot" style="background:'+C[item.area]+'"></span>'+item.owner+'</div>';
    row.appendChild(meta);
    var dead=document.createElement('div');
    dead.className='gdead '+item.dc;
    dead.innerHTML=item.dead+badge;
    row.appendChild(dead);
    for(var col=1;col<=4;col++){
      var cell=document.createElement('div');
      if(col>=item.s&&col<=item.e){
        var len=item.e-item.s;
        var cls=len===0?'gbar':col===item.s?'gbar-s':col===item.e?'gbar-e':'gbar-m';
        cell.className='gcell '+cls;
        cell.style.background=C[item.area];
      } else {
        cell.className='gcell';
      }
      row.appendChild(cell);
    }
    g.appendChild(row);
  });
  var leg=document.getElementById('legend');
  [['credito','Crédito'],['originacao','Originação'],['estruturacao','Estruturação'],['fornecedor','Fornecedores']].forEach(function(e){
    leg.innerHTML+='<div class="leg"><div class="leg-color" style="background:'+C[e[0]]+'"></div>'+e[1]+'</div>';
  });
}

var SK='fidc_todos_v3';
function loadDone(){try{return JSON.parse(localStorage.getItem(SK)||'{}')}catch(e){return{}}}
function saveDone(s){try{localStorage.setItem(SK,JSON.stringify(s))}catch(e){}}

function renderTodos(){
  var done=loadDone();
  var list=document.getElementById('todos');
  ITEMS.forEach(function(item){
    var isDone=!!done[item.id];
    var card=document.createElement('div');
    card.className='todo-card';
    card.onclick=function(){toggleTodo(item.id)};
    var deadLabel=item.dc==='crit'?'⚑ '+item.dead:item.dead;
    card.innerHTML=
      '<div class="todo-accent" id="acc-'+item.id+'" style="background:'+(isDone?'#2e7012':C[item.area])+'"></div>'+
      '<div class="todo-row">'+
        '<div class="todo-num">'+item.id+'</div>'+
        '<div>'+
          '<div class="todo-title'+(isDone?' done':'')+'" id="tt-'+item.id+'">'+item.title+'</div>'+
          '<div class="todo-meta"><span class="owner-tag"><span class="dot" style="background:'+C[item.area]+'"></span>'+item.owner+'</span></div>'+
        '</div>'+
        '<div class="todo-dead '+item.dc+'">'+deadLabel+'</div>'+
        '<div class="chkbox'+(isDone?' done':'')+'" id="chk-'+item.id+'">'+
          '<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
        '</div>'+
      '</div>';
    list.appendChild(card);
  });
  updateProg();
}

function toggleTodo(id){
  var done=loadDone();
  done[id]=!done[id];
  saveDone(done);
  var isDone=done[id];
  var item=ITEMS.find(function(i){return i.id===id});
  document.getElementById('tt-'+id).className='todo-title'+(isDone?' done':'');
  document.getElementById('chk-'+id).className='chkbox'+(isDone?' done':'');
  document.getElementById('acc-'+id).style.background=isDone?'#2e7012':C[item.area];
  updateProg();
}

function updateProg(){
  var done=loadDone();
  var n=Object.values(done).filter(Boolean).length;
  document.getElementById('pfill').style.width=(n/ITEMS.length*100)+'%';
  document.getElementById('plbl').textContent=n+' / '+ITEMS.length+' concluídos';
}

function show(id,btn){
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active')});
  document.getElementById('v-'+id).classList.add('active');
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  btn.classList.add('active');
}

renderCards();renderGantt();renderTodos();
</script>
</body>
</html>
